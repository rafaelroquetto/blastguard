name: blastguard-sanity

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show kernel + BTF info
        run: |
          uname -a
          ls -la /sys/kernel/btf/vmlinux || true
          ls /sys/kernel/security/lsm 2>/dev/null || true
          cat /proc/sys/kernel/unprivileged_bpf_disabled 2>/dev/null || true

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libbpf-dev linux-tools-common linux-tools-generic cmake

      - name: Build
        run: |
          cmake -B build
          cmake --build build -j

      - name: Check license headers
        run: cmake --build build --target license-check

      - name: Smoke test (audit mode)
        run: |
          sudo build/blastguardd --mode audit -a example.com -a registry.npmjs.org >/tmp/blastguardd.log 2>&1 &
          DAEMON_PID=$!
          sleep 0.5
          build/blastguardctl ping
          build/blastguardctl start-phase $$ install
          bash -c 'NPM_TOKEN=x curl -s http://example.com >/dev/null'
          build/blastguardctl end-phase
          build/blastguardctl report --format=markdown --fail-on=none
          build/blastguardctl shutdown || sudo kill $DAEMON_PID
          echo "----- daemon log -----"
          cat /tmp/blastguardd.log

      - name: Run evil-helper fixture (expect non-zero exit)
        run: |
          set +e
          bash test/integration/run-evil.sh
          RC=$?
          if [ $RC -eq 0 ]; then
            echo "expected non-zero exit for evil-helper, got 0" >&2
            exit 1
          fi
          echo "evil-helper correctly flagged (exit $RC)"

      - name: Run benign fixture (expect zero exit)
        run: |
          bash test/integration/run-benign.sh
