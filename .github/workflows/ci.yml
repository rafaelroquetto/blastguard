name: ci

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        build_type: [dynamic, static]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Show kernel + BTF info
        run: |
          uname -a
          ls -la /sys/kernel/btf/vmlinux || true

      - name: Install clang-22 from llvm.org
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 22
          sudo apt-get install -y clang-format-22

      - name: Install other build deps
        run: |
          sudo apt-get install -y \
            libstdc++-14-dev cmake jq \
            libbpf-dev libelf-dev

      - name: Install bpftool (static binary, kernel-independent)
        run: |
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64)  bpf_arch=amd64 ;;
            aarch64) bpf_arch=arm64 ;;
          esac
          tmp=$(mktemp -d)
          curl -fsSL "https://github.com/libbpf/bpftool/releases/download/v7.6.0/bpftool-v7.6.0-${bpf_arch}.tar.gz" \
            | tar -xz -C "$tmp"
          sudo install -m 755 "$tmp/bpftool" /usr/local/bin/bpftool
          bpftool version

      - name: Configure (dynamic)
        if: matrix.build_type == 'dynamic'
        env:
          CC: clang-22
          CXX: clang++-22
        run: cmake -B build

      - name: Configure (static)
        if: matrix.build_type == 'static'
        env:
          CC: clang-22
          CXX: clang++-22
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DBLASTGUARD_STATIC=ON

      - name: Build
        run: cmake --build build -j

      - name: Check formatting
        if: matrix.build_type == 'dynamic'
        run: cmake --build build --target format-check

      - name: Check license headers
        if: matrix.build_type == 'dynamic'
        run: cmake --build build --target license-check

      - name: Integration tests
        run: cmake --build build --target tests
