name: release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-24.04
            arch: x86_64
          - runs-on: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install clang-22 from llvm.org
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 22

      - name: Install other build deps
        run: |
          sudo apt-get install -y \
            libstdc++-14-dev cmake \
            libelf-dev

      - name: Install bpftool (static binary, kernel-independent)
        run: |
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64)  bpf_arch=amd64 ;;
            aarch64) bpf_arch=arm64 ;;
          esac
          tmp=$(mktemp -d)
          curl -fsSL "https://github.com/libbpf/bpftool/releases/download/v7.6.0/bpftool-v7.6.0-${bpf_arch}.tar.gz" \
            | tar -xz -C "$tmp"
          sudo install -m 755 "$tmp/bpftool" /usr/local/bin/bpftool

      - name: Configure
        env:
          CC: clang-22
          CXX: clang++-22
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DBLASTGUARD_STATIC=ON

      - name: Build
        run: cmake --build build -j

      - name: Inspect runtime dependencies
        run: |
          echo "----- blastguardd -----"
          ldd build/blastguardd || true
          echo "----- blastguardctl -----"
          ldd build/blastguardctl || true

      - name: Package
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          STAGE="blastguard-${VERSION}-linux-${{ matrix.arch }}"
          mkdir -p "dist/${STAGE}"
          cp build/blastguardd build/blastguardctl LICENSE README.md "dist/${STAGE}/"
          tar -C dist -czf "${STAGE}.tar.gz" "${STAGE}"
          sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber \
            blastguard-*.tar.gz \
            blastguard-*.tar.gz.sha256
