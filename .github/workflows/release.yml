name: release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-22.04
            arch: x86_64
          - runs-on: ubuntu-22.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake \
            libelf-dev \
            linux-tools-common linux-tools-generic

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DBLASTGUARD_STATIC=ON

      - name: Build
        run: cmake --build build -j

      - name: Inspect runtime dependencies
        run: |
          echo "----- blastguardd -----"
          ldd build/blastguardd || true
          echo "----- blastguardctl -----"
          ldd build/blastguardctl || true

      - name: Package
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          STAGE="blastguard-${VERSION}-linux-${{ matrix.arch }}"
          mkdir -p "dist/${STAGE}"
          cp build/blastguardd build/blastguardctl LICENSE README.md "dist/${STAGE}/"
          tar -C dist -czf "${STAGE}.tar.gz" "${STAGE}"
          sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber \
            blastguard-*.tar.gz \
            blastguard-*.tar.gz.sha256
