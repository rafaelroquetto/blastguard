name: 'Blastguard'
description: 'Package-manager-aware CI runtime forensics for supply-chain attacks'

inputs:
  version:
    description: 'Blastguard release tag to install (defaults to the ref the action was pinned to)'
    required: false
    default: ''
  mode:
    description: 'audit (observe + report) or enforce (also block non-allowlisted connects)'
    required: false
    default: 'audit'
  allowed-hosts:
    description: 'comma-separated hostnames permitted during install'
    required: false
    default: 'registry.npmjs.org,registry.yarnpkg.com,github.com,objects.githubusercontent.com,nodejs.org,deb.nodesource.com'
  watch-pid:
    description: 'pid to track (defaults to $$ of the calling shell)'
    required: false
    default: ''
  phase:
    description: 'phase name'
    required: false
    default: 'install'

runs:
  using: 'composite'
  steps:
    - name: Install blastguard
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        ACTION_REPO: ${{ github.action_repository }}
        ACTION_REF: ${{ github.action_ref }}
      run: |
        set -euo pipefail

        if [ -z "${VERSION}" ]; then
          VERSION="${ACTION_REF}"
        fi

        if [ -z "${VERSION}" ] || [ "${VERSION}" = "main" ] || [ "${VERSION}" = "master" ]; then
          echo "blastguard: pin to a release tag (e.g. uses: ${ACTION_REPO}@v0.1.0)" >&2
          exit 1
        fi

        ARCH="$(uname -m)"
        case "$ARCH" in
          x86_64|aarch64) ;;
          *) echo "blastguard: unsupported arch ${ARCH}" >&2; exit 1 ;;
        esac

        INSTALL_DIR="${RUNNER_TOOL_CACHE}/blastguard/${VERSION}/${ARCH}"

        if [ ! -x "${INSTALL_DIR}/blastguardd" ]; then
          TARBALL="blastguard-${VERSION}-linux-${ARCH}.tar.gz"
          BASE_URL="https://github.com/${ACTION_REPO}/releases/download/${VERSION}"

          tmp="$(mktemp -d)"
          curl -fsSL -o "${tmp}/${TARBALL}" "${BASE_URL}/${TARBALL}"
          curl -fsSL -o "${tmp}/${TARBALL}.sha256" "${BASE_URL}/${TARBALL}.sha256"
          (cd "${tmp}" && sha256sum -c "${TARBALL}.sha256")

          mkdir -p "${INSTALL_DIR}"
          tar -xzf "${tmp}/${TARBALL}" -C "${INSTALL_DIR}" --strip-components=1
          rm -rf "${tmp}"
        fi

        echo "${INSTALL_DIR}" >> "${GITHUB_PATH}"

    - name: Start blastguardd
      shell: bash
      env:
        MODE: ${{ inputs.mode }}
        ALLOWED_HOSTS: ${{ inputs.allowed-hosts }}
      run: |
        set -euo pipefail

        ALLOW_ARGS=()
        IFS=',' read -ra HOSTS <<< "${ALLOWED_HOSTS}"
        for h in "${HOSTS[@]}"; do
          ALLOW_ARGS+=(-a "$h")
        done

        sudo blastguardd --mode "${MODE}" "${ALLOW_ARGS[@]}" \
          >/tmp/blastguardd.log 2>&1 &
        echo $! | sudo tee /var/run/blastguardd.pid >/dev/null
        sleep 0.5

    - name: Start phase
      shell: bash
      env:
        WATCH_PID: ${{ inputs.watch-pid }}
        PHASE: ${{ inputs.phase }}
      run: |
        set -euo pipefail

        if [ -z "${WATCH_PID}" ]; then
          WATCH_PID=$PPID
        fi

        blastguardctl start-phase "${WATCH_PID}" "${PHASE}"
